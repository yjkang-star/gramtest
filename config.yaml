# Example:
#   python preprocess.py
#   python train.py
#   python train.py --model yolo11s.pt --data ./data.yaml --epochs 100
#   python val.py --model ./runs/train/yolo11n-exp/weights/best.pt --data ./data.yaml
#   python predict.py --model ./runs/train/yolo11n-exp/weights/best.pt --source ./images
#   python inference.py --model ./runs/train/yolo11n-exp/weights/best.pt --source ./images

model: yolo11n.pt
task: detect
class_names:
  - class0

preprocess:
  images_dir: ./raw/images
  labels_dir: ./raw/labels
  output_dir: ./dataset
  data_yaml: ./dataset/data.yaml
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  seed: 42
  copy_files: false

train:
  data: ./dataset/data.yaml
  epochs: 100
  imgsz: 640
  batch: 16
  device: "0"
  project: ./runs/train
  name: yolo11n-exp
  workers: 8
  patience: 30
  optimizer: auto
  lr0: 0.01
  pretrained: true
  exist_ok: true
  verbose: true

val:
  data: ./dataset/data.yaml
  imgsz: 640
  batch: 16
  device: "0"
  split: val
  project: ./runs/val
  name: yolo11n-val
  workers: 8
  conf: 0.001
  iou: 0.6
  max_det: 300
  verbose: true

predict:
  source: ./images
  imgsz: 640
  conf: 0.25
  iou: 0.7
  device: "0"
  project: ./runs/predict
  name: yolo11n-predict
  max_det: 300
  vid_stride: 1
  save: true
  verbose: true
